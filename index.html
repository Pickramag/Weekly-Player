<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Player - Современный музыкальный плеер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Фон страницы - замените на свою картинку */
            /*background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);*/
            /* Или используйте изображение: */
            position: relative;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, rgba(138, 43, 226, 0.1) 100%),
                        url('https://media.discordapp.net/attachments/1190194781838655539/1506784472203399240/image.png?ex=6a0f85e4&is=6a0e3464&hm=922a36cbd6a1ced37a261902766ba81b053835cd4c30d1f97116d23236921750&=&format=webp&quality=lossless&width=1430&height=816');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            /* САМО РАЗМЫТИЕ */
            filter: blur(15px); /* Меняй силу размытия (5px - 20px) */
            
            /* Исправление белых краев по бокам из-за размытия */
            transform: scale(1.1); 
            
            /* Помещаем на задний план */
            z-index: -1; 
        }

        /* Шапка с изображением */
        .header-banner {
            width: 100%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header-image {
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 255, 136, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            display: block;
        }

        /* Основной контент */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00ff88 0%, #8a2be2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(0, 255, 136, 0.3);
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 1.3rem;
            color: #b8b8d1;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        /* Кнопки */
        .buttons-container {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .btn {
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-github {
            background: transparent;
            color: #00ff88;
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3),
                        inset 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .btn-github:hover {
            background: rgba(0, 255, 136, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 5px 30px rgba(0, 255, 136, 0.5),
                        inset 0 0 30px rgba(0, 255, 136, 0.2);
        }

        .btn-download {
            background: linear-gradient(135deg, #8a2be2 0%, #9d4edd 100%);
            color: white;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.4),
                        0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 30px rgba(138, 43, 226, 0.6),
                        0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn svg {
            width: 24px;
            height: 24px;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .logo {
                font-size: 3.5rem;
            }
            
            .tagline {
                font-size: 1.1rem;
            }
            
            .buttons-container {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
            
            .header-banner {
                margin: 20px auto;
            }
        }

        /* Декоративные элементы на фоне */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            z-index: -1;
            pointer-events: none;
        }

        .glow-1 {
            width: 500px;
            height: 500px;
            background: #00ff88;
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            width: 400px;
            height: 400px;
            background: #8a2be2;
            bottom: -100px;
            right: -100px;
        }
    </style>
</head>
<body>
    <!-- Декоративные элементы -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <!-- Шапка с изображением -->
    <div class="header-banner">
        <!-- Замените 'your-image.jpg' на имя вашего файла -->
        <img src="https://media.discordapp.net/attachments/1190194781838655539/1506732831915901059/WeeklySplash.png?ex=6a0f55cc&is=6a0e044c&hm=e3c06d983e34dc823954f24143f9235a0d5051000a73fe12fcb59f0f6f7234f2&=&format=webp&quality=lossless&width=1787&height=300" alt="Weekly Player" class="header-image">
    </div>

    <!-- Основной контент -->
    <div class="main-content">

        </div>
    </div>
</body>
</html>
